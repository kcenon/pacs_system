# SOUP/SBOM provenance drift gate (IEC 62304 §8.1.2).
#
# Detects drift between the three places this repo records the pinned commit
# SHA of each internal kcenon ecosystem dependency:
#   1. dependency-manifest.json
#   2. .github/actions/checkout-kcenon-deps/action.yml
#   3. docs/SOUP.md
#
# STRICT (enforcing): the script runs with --strict and FAILS CI if any of the
# three provenance sources (dependency-manifest.json, the checkout-kcenon-deps
# action, docs/SOUP.md) diverge or reference an unresolvable commit. Switched
# from advisory to strict in #1189 once the manifest was repaired (see
# docs/compliance/problem-resolution/PR-001-soup-dangling-sha.md).
# Mark this check "required" in branch protection to complete the gate.

name: Manifest Drift Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'dependency-manifest.json'
      - '.github/actions/checkout-kcenon-deps/action.yml'
      - 'docs/SOUP.md'
      - 'scripts/check_manifest_drift.py'
      - '.github/workflows/manifest-drift.yml'

permissions:
  contents: read

jobs:
  manifest-drift:
    name: SOUP manifest drift (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check internal SHA provenance drift
        run: python3 scripts/check_manifest_drift.py --strict
